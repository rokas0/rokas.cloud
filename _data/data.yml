experiences:
  title: Experiences
  info:
    - role: Head of Platform Architecture
      time: July 2019 - Present
      company: Korelogic Limited, Leeds
      details: |
        Accountable for platform reliability, security, performance, and cloud cost management across multi-tenant AWS infrastructure
          - Reduced AWS spend by identifying inefficiencies, right-sizing resources, and selecting cost-optimal architectures
          - Built and maintained cost attribution models to track spend across services and business units
          - Evaluated and optimised cloud solutions using AWS Well-Architected Framework (Cost Optimisation pillar)
          - Designed serverless solutions using Lambda, DynamoDB, and S3 — optimising for cost-per-transaction
          - Managed DynamoDB capacity modes and provisioned throughput to balance performance with spend
          - Produced container solutions using ECS and Fargate with appropriate compute sizing
          - Architected AWS VPC connectivity with on-premises data centre
          - Established access governance and financial controls for AWS resource provisioning
          - Presented infrastructure cost reports and optimisation recommendations to leadership
    - role: Software Engineer
      time: August 2017 - July 2019
      company: Sky Betting and Gaming, Leeds
      details: |
        Built a cost-efficient serverless messaging platform from scratch in a regulated iGaming environment
          - Designed event-driven architecture using API Gateway, SNS, SQS, Lambda, and DynamoDB — optimised for pay-per-use pricing
          - Managed ECS Fargate containers for Kafka Connect with right-sized task definitions
          - Used Terraform to codify infrastructure, enabling cost visibility and change tracking
          - Operated in a compliance-driven environment with strict financial and operational controls
          - Kafka used to stream data from on-premises to AWS at scale
          - Daily deployments via Jenkins CI/CD pipelines
    - role: Senior Java PHP Developer (Contract)
      time: 2016 - 2017
      company: Plusnet (BT) / Tata Consultancy Service, Sheffield
      details: |
        Delivered software in a regulated telecoms environment with strict change controls
          - Worked in Agile team with 2-week sprints and continuous integration via Jenkins
          - Translated high-level architectural designs into low-level implementations
          - Applied TDD and integration testing to ensure quality in production deployments
    - role: Web Developer
      time: 2012 - 2016
      company: Invitetobuy.dk, Copenhagen, Denmark
      details: |
        Backend development for a rapidly growing e-commerce platform
          - Built REST APIs and CMS plugins (Drupal, Prestashop)
          - Applied TDD practices for PHP and JavaScript
    - role: Web Developer
      time: 2007 - 2009
      company: Virtual.lt, Panevezys, Lithuania
      details: |
        Developed a content management system from scratch, deployed to 100+ websites

