career-profile:
  title: Career Profile
  summary: |
    AWS-certified cloud architect with 10+ years designing and operating cloud platforms at scale.
    Proven track record of reducing AWS spend through right-sizing, architectural optimisation, and cost governance.
    Deep experience with serverless (Lambda, DynamoDB, S3), containers (ECS/Fargate), and infrastructure-as-code (Terraform).
    Background in iGaming and regulated environments with strong financial accountability.

